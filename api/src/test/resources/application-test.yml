spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Non appelé avec @WithMockUser — valeur fictive pour satisfaire le démarrage
          jwk-set-uri: http://localhost/jwks

keycloak:
  public-issuer: https://localhost:8443/realms/my-realm
