events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Redirection HTTP → HTTPS ────────────────────────────────────────────────
  # Port explicite 8443 — le port 443 standard n'est pas utilisé en dev
  server {
    listen 80;
    server_name localhost;
    return 301 https://$host:8443$request_uri;
  }

  # ─── HTTPS ───────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── Headers de sécurité ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── Keycloak (proxifié — le browser ne voit que localhost:8443) ────────
    # Le browser est redirigé ici pour le formulaire de login OIDC.
    # Keycloak n'est jamais exposé directement ; tout passe par Nginx.
    # $http_host inclut le port (localhost:8443) → Keycloak génère des URLs correctes
    location /realms/ {
      proxy_pass         http://keycloak:8080/realms/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $http_host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      # $host = "localhost" (sans port) — le port est passé séparément
      proxy_set_header   X-Forwarded-Host  $host;
      # Port hôte en dur : $server_port = 443 (interne Docker), pas 8443 (hôte)
      proxy_set_header   X-Forwarded-Port  8443;
    }

    location /resources/ {
      proxy_pass         http://keycloak:8080/resources/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $http_host;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Forwarded-Host  $hostname;
      proxy_set_header   X-Forwarded-Port  8443;
    }

    # ─── BFF (toutes les routes /bff/**) ─────────────────────────────────────
    location /bff/ {
      proxy_pass         http://bff:8081/bff/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $http_host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Forwarded-Host  $http_host;
      # $server_port = 443 (interne Docker), pas 8443 (hôte) — on fixe en dur
      proxy_set_header   X-Forwarded-Port  8443;

      # Transmission des cookies
      proxy_pass_header  Set-Cookie;
      proxy_cookie_path  / "/; SameSite=Strict; Secure; HttpOnly";
    }

    # ─── Frontend Angular ─────────────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend:80/;
      proxy_http_version 1.1;
      proxy_set_header   Host            $http_host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

      # Support du routing Angular (SPA)
      proxy_intercept_errors on;
      error_page 404 = /index.html;
    }
  }
}
